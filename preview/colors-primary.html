<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><title>preview/colors-primary.html</title><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../base.css"><link rel="stylesheet" href="../components.css"><link rel="stylesheet" href="_card.css"><style>

  <div style="font-size:12px;color:var(--text-secondary);line-height:1.5">CTAs use <strong>600</strong>. Headings use <strong>800</strong>. Gov.br topbar uses <strong>900</strong>. Tints (50-100) for backgrounds.</div>
