<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><title>preview/colors-neutrals.html</title><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../base.css"><link rel="stylesheet" href="../components.css"><link rel="stylesheet" href="_card.css"><style>
/* swatch demonstration: raw neutral scale values are intentionally shown here for palette inspection. */
.swatch-neutral-0{background:#ffffff}.swatch-neutral-50{background:#f8fafc}.swatch-neutral-100{background:#f1f5f9}.swatch-neutral-200{background:#e2e8f0}.swatch-neutral-300{background:#cbd5e1}.swatch-neutral-500{background:#64748b}.swatch-neutral-600{background:#475569}.swatch-neutral-700{background:#334155}.swatch-neutral-800{background:#1f2937}.swatch-neutral-900{background:#0f172a}
</style></head><body>
<div class="card-frame">
  <div class="tag-eyebrow">NEUTRALS</div>
  <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:6px">
    <div><div class="swatch-neutral-0" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">0</div></div>
    <div><div class="swatch-neutral-50" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">50·page</div></div>
    <div><div class="swatch-neutral-100" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">100·hover</div></div>
    <div><div class="swatch-neutral-200" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">200·border</div></div>
    <div><div class="swatch-neutral-300" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">300·form</div></div>
    <div><div class="swatch-neutral-500" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">500·muted</div></div>
    <div><div class="swatch-neutral-600" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">600</div></div>
    <div><div class="swatch-neutral-700" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">700</div></div>
    <div><div class="swatch-neutral-800" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">800·body</div></div>
    <div><div class="swatch-neutral-900" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle)"></div><div class="mono" style="margin-top:4px">900</div></div>
  </div>
  <div style="font-size:12px;color:var(--text-secondary)">Body usa <code style="font-family:var(--font-mono);font-size:11px">--text-primary</code>. Secondary usa <code style="font-family:var(--font-mono);font-size:11px">--text-secondary</code>. Use tokens semânticos em componentes.</div>
</div></body></html>
