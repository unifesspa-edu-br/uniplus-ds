<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><title>preview/comp-filter-bar.html</title><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../base.css"><link rel="stylesheet" href="../components.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="tag-eyebrow">FILTER BAR</div>
  <div class="filter-bar" role="search" aria-label="Buscar editais" style="margin:0">
    <div class="filter-bar__row">
      <div class="input-group" style="flex:1;min-width:200px"><span class="input-group__addon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg></span><input class="input" type="search" placeholder="Buscar por edital, curso…"/></div>
      <button class="btn btn--tertiary btn--sm">Limpar</button>
    </div>
    <div>
      <span class="u-eyebrow" style="display:block;margin-bottom:8px">Status</span>
      <div class="filter-chips"><button class="filter-chip" aria-pressed="true">Inscrições abertas <span class="filter-chip__count">2</span></button><button class="filter-chip">Últimos dias <span class="filter-chip__count">1</span></button><button class="filter-chip">Encerrados</button></div>
    </div>
  </div>
  <div class="mono">role="search" no container. aria-pressed nos chips. Eyebrow agrupa filtros por categoria.</div>
</div></body></html>
