<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><title>preview/comp-skeleton.html</title><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../base.css"><link rel="stylesheet" href="../components.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="tag-eyebrow">SKELETON LOADER</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)">
    <div role="status" aria-busy="true" aria-label="Carregando" style="display:flex;flex-direction:column;gap:var(--space-3);padding:var(--space-4);background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg)">
      <div style="display:flex;align-items:center;gap:var(--space-3)">
        <div class="skeleton skeleton--circle" style="width:40px;height:40px" aria-hidden="true"></div>
        <div style="flex:1">
          <div class="skeleton skeleton--text" style="width:60%" aria-hidden="true"></div>
          <div class="skeleton skeleton--text" style="width:40%" aria-hidden="true"></div>
        </div>
      </div>
      <div class="skeleton skeleton--title" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" style="width:80%" aria-hidden="true"></div>
    </div>
    <div role="status" aria-busy="true" aria-label="Carregando" style="display:flex;flex-direction:column;gap:var(--space-3)">
      <div class="skeleton skeleton--card" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" style="width:70%" aria-hidden="true"></div>
    </div>
  </div>
  <div class="mono">Wrapper precisa de <code>aria-busy="true"</code> + <code>aria-label="Carregando"</code>. Skeletons internos são <code>aria-hidden="true"</code>. Sem motion: degrada para tom único (sem pulse).</div>
</div></body></html>
