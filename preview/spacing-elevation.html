<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>preview/spacing-elevation.html</title><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../base.css"><link rel="stylesheet" href="../components.css"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="tag-eyebrow">ELEVATION · RESTRICTED</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:8px">
    <div style="height:80px;border-radius:12px;background:var(--surface-card);border:1px solid var(--border-subtle);display:flex;align-items:flex-end"><div class="mono" style="padding:8px">border · card default</div></div>
    <div style="height:80px;border-radius:12px;background:var(--surface-card);box-shadow:var(--shadow-1);display:flex;align-items:flex-end"><div class="mono" style="padding:8px">shadow-1<br>hover</div></div>
    <div style="height:80px;border-radius:12px;background:var(--surface-card);box-shadow:var(--shadow-2);display:flex;align-items:flex-end"><div class="mono" style="padding:8px">shadow-2<br>dropdown</div></div>
    <div style="height:80px;border-radius:12px;background:var(--surface-card);box-shadow:var(--shadow-3);display:flex;align-items:flex-end"><div class="mono" style="padding:8px">shadow-3<br>modal</div></div>
  </div>
  <div style="font-size:12px;color:var(--text-secondary)">Default = borda, não sombra. Sombras apenas em overlays/modais. Gov.br é chapado.</div>
</div></body></html>
