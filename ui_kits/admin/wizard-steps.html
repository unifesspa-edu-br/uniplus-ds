<template id="step-1">
  <div class="step-head">
    <span class="step-head__badge">Passo 1</span>
    <h1>Tipo do edital</h1>
    <p>Escolha o tipo de processo seletivo.</p>
  </div>
  <div class="type-search">
    <div class="input-group">
      <span class="input-group__addon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7" />
          <path d="M21 21l-4.5-4.5" />
        </svg>
      </span>
      <input class="input" type="search" placeholder="Buscar por tipos de editais..."
        aria-label="Buscar tipos de editais" />
    </div>
  </div>
  <fieldset class="type-grid">
    <legend class="sr-only">Tipo de edital</legend>

    <label class="type-card is-selected">
      <input class="sr-only" type="radio" name="tipo-edital" value="sisu" checked>
      <div class="type-card__head">
        <span class="type-card__name">SiSU</span>
        <svg class="type-card__check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </div>
      <p class="type-card__desc">Sistema de Seleção Unificada — utiliza notas do ENEM para classificação. Notas obtidas
        via integração com INEP, sem prova local.</p>
      <div class="type-card__tags">
        <span class="type-card__tag">2 opções</span>
      </div>
      <span class="type-card__legal">Portaria MEC 21/2012; Lei 12.711/2012 atualizada pela Lei 14.723/2023</span>
    </label>

    <label class="type-card">
      <input class="sr-only" type="radio" name="tipo-edital" value="psiq">
      <div class="type-card__head">
        <span class="type-card__name">PSIQ — Indígena e Quilombola</span>
        <svg class="type-card__check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </div>
      <p class="type-card__desc">Processo Seletivo Especial para candidatos indígenas e quilombolas, com vagas
        suplementares e prova presencial em 3 polos.</p>
      <div class="type-card__tags">
        <span class="type-card__tag">2 opções</span>
        <span class="type-card__tag">Presencial</span>
        <span class="type-card__tag">Suplementares</span>
      </div>
      <span class="type-card__legal">Resolução Unifesspa 532/2021</span>
    </label>

    <label class="type-card">
      <input class="sr-only" type="radio" name="tipo-edital" value="pse">
      <div class="type-card__head">
        <span class="type-card__name">PSE — Educação do Campo</span>
        <svg class="type-card__check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </div>
      <p class="type-card__desc">Processo Seletivo Especial para Licenciatura em Educação do Campo. Exige declaração de
        pertencimento territorial e entrevista.</p>
      <div class="type-card__tags">
        <span class="type-card__tag">Presencial</span>
      </div>
      <span class="type-card__legal">Resolução Unifesspa 805/2024</span>
    </label>

    <label class="type-card">
      <input class="sr-only" type="radio" name="tipo-edital" value="psvr">
      <div class="type-card__head">
        <span class="type-card__name">PSVR — Vestibular Remanescente</span>
        <svg class="type-card__check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </div>
      <p class="type-card__desc">Processo Seletivo para vagas remanescentes após SiSU. Utiliza prova presencial objetiva
        + redação.</p>
      <div class="type-card__tags">
        <span class="type-card__tag">Presencial</span>
      </div>
      <span class="type-card__legal">Portaria MEC 18/2012; Resolução CONSEPE Unifesspa</span>
    </label>

    <label class="type-card">
      <input class="sr-only" type="radio" name="tipo-edital" value="ps-convenios">
      <div class="type-card__head">
        <span class="type-card__name">PS Convênios</span>
        <svg class="type-card__check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </div>
      <p class="type-card__desc">Processo Seletivo de cursos por convênio com municípios. Aplica bônus regional
        configurável (padrão 20% sobre AC).</p>
      <div class="type-card__tags">
        <span class="type-card__tag">Presencial</span>
      </div>
      <span class="type-card__legal">PN MEC 2.027/2023; Resolução Unifesspa do convênio específico</span>
    </label>

    <label class="type-card">
      <input class="sr-only" type="radio" name="tipo-edital" value="mobin">
      <div class="type-card__head">
        <span class="type-card__name">Transferência Interna (MOBIN)</span>
        <svg class="type-card__check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </div>
      <p class="type-card__desc">Mobilidade interna entre cursos da Unifesspa. Análise de histórico e carta de intenção.
      </p>
      <span class="type-card__legal">Resolução Unifesspa 414/2020</span>
    </label>

    <label class="type-card">
      <input class="sr-only" type="radio" name="tipo-edital" value="mobex">
      <div class="type-card__head">
        <span class="type-card__name">Transferência Externa (MOBEX)</span>
        <svg class="type-card__check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </div>
      <p class="type-card__desc">Mobilidade externa de outras IFES para a Unifesspa. Análise de histórico e carta de
        intenção.</p>
      <span class="type-card__legal">Resolução Unifesspa 414/2020</span>
    </label>

    <label class="type-card">
      <input class="sr-only" type="radio" name="tipo-edital" value="portador-diploma">
      <div class="type-card__head">
        <span class="type-card__name">Portador de Diploma</span>
        <svg class="type-card__check" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </div>
      <p class="type-card__desc">Ingresso para portadores de diploma de curso superior. Análise de histórico de
        graduação anterior.</p>
      <span class="type-card__legal">Resolução Unifesspa 414/2020</span>
    </label>

  </fieldset>
</template>

<template id="step-2">
  <div class="step-head">
    <span class="step-head__badge">Passo 2</span>
    <h1>Passo 2: Identificação</h1>
  </div>
  <p class="step-subtitle">Dados de identificação do edital. O PDF é obrigatório para auditoria (RNo08 + LGPD).
  </p>

  <div class="step-card">
    <div class="form-grid">
      <div class="form-field">
        <label class="label" for="f-num">Número do edital</label>
        <input class="input" id="f-num" value="2026" placeholder="Ex.: 12/2026">
      </div>
      <div class="form-field">
        <label class="label" for="f-ano">Ano do edital</label>
        <div class="input-icon-wrap">
          <input class="input" id="f-ano" type="number" value="2026">
          <span class="input-icon-wrap__icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
          </span>
        </div>
      </div>
      <div class="form-field">
        <label class="label" for="f-data">Data do processo</label>
        <div class="input-icon-wrap">
          <input class="input" id="f-data" type="date" value="">
          <button class="input-icon-wrap__btn" id="btn-calendar" type="button" aria-label="Abrir calendário">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
          </button>
        </div>
      </div>
      <div class="form-field">
        <label class="label" for="f-orgao">Sigla do órgão expedidor</label>
        <input class="input" id="f-orgao" value="CEPS/UNIFESSPA">
      </div>
      <div class="form-field form-grid__full">
        <label class="label" for="f-periodo">Período de ingresso</label>
        <select class="input" id="f-periodo">
          <option selected>1º semestre</option>
          <option>2º semestre</option>
          <option>Anual</option>
        </select>
      </div>
      <div class="form-field form-grid__full">
        <label class="label" for="f-nome">Nome do processo seletivo</label>
        <input class="input" id="f-nome" value="Transporte">
      </div>
    </div>
  </div>

  <div class="step-card upload-section">
    <label class="label">Upload de arquivos</label>
    <input type="file" id="f-file-input" accept=".pdf,.png" multiple class="sr-only"
      aria-label="Selecionar arquivos PDF ou PNG">
    <div class="upload-layout">
      <div class="upload-zone" id="f-upload" role="button" tabindex="0" aria-label="Clique ou arraste arquivos aqui">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        <span>Arraste e solte um arquivo ou <span class="upload-zone__link">Procure</span></span>
        <span class="upload-zone__hint">Apenas arquivos em PDF e PNG são suportados</span>
      </div>
      <div class="file-list" id="file-list"></div>
    </div>
  </div>
</template>

<template id="step-3">
  <div class="step-head">
    <span class="step-head__badge">Passo 3</span>
    <h1>Passo 3: Modalidades</h1>
  </div>

  <section class="step-section">
    <h2 class="step-section__title">Modalidades de concorrência</h2>

    <div class="step-card">
      <div class="form-field">
        <label class="label" style="display:block;margin-bottom:var(--space-2)">Selecione as modalidades que esse edital
          aceita</label>
        <button class="btn btn--outline btn--sm" id="btn-add-modalidade" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" aria-hidden="true">
            <path d="M12 5v14M5 12h14" />
          </svg>
          Adicionar modalidade
        </button>
      </div>
      <div id="modalidades-grid" class="checkbox-grid" style="margin-top:var(--space-4)">
        <!-- <label class="check-item"><input type="checkbox" checked><span>AC — Ampla Concorrência</span></label>
        <label class="check-item"><input type="checkbox" checked><span>V — Pessoa com Deficiência (Ampla
            Concorrência)</span></label>
        <label class="check-item"><input type="checkbox" checked><span>LB_Q — Baixa Renda + Quilombola</span></label>
        <label class="check-item"><input type="checkbox" checked><span>LB_PcD — Baixa Renda + Pessoa com
            Deficiência</span></label>
        <label class="check-item"><input type="checkbox" checked><span>LI_PPI — Independente de Renda + PPI (Pretos,
            Pardos ou Indígenas)</span></label>
        <label class="check-item"><input type="checkbox" checked><span>LI_Q — Independente de Renda +
            Quilombola</span></label>
        <label class="check-item"><input type="checkbox" checked><span>LI_EP — Independente de Renda — Demais (Escola
            Pública)</span></label> -->
      </div>
    </div>
  </section>

  <dialog class="vagas-modal" id="modalidade-modal" aria-labelledby="modalidade-modal-title">
    <div class="vagas-modal__panel">
      <div class="vagas-modal__header">
        <h2 class="vagas-modal__title" id="modalidade-modal-title">Modalidades de concorrência</h2>
        <button class="vagas-modal__close" id="modalidade-modal-close" type="button" aria-label="Fechar modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="vagas-modal__body">
        <ul class="vagas-modal__list" id="modalidade-modal-list" role="group" aria-labelledby="modalidade-modal-title">
        </ul>
      </div>
      <div class="vagas-modal__footer">
        <button class="btn btn--ghost" id="modalidade-modal-cancel" type="button">Cancelar</button>
        <button class="btn btn--primary" id="modalidade-modal-confirm" type="button">Confirmar seleção</button>
      </div>
    </div>
  </dialog>

  <section class="step-section">
    <h2 class="step-section__title">
      Concorrência dupla
      <span class="title-meta"> (Lei 14.723/2023)</span>
    </h2>

    <div class="step-card dupla-card">
      <span class="dupla-lei">Lei 14.723/2023</span>
      <label class="check-item">
        <input type="checkbox" checked>
        <span>Aplicar concorrência dupla — cotista que atinge nota de AC ocupa vaga de AC</span>
      </label>
    </div>
  </section>
</template>

<template id="step-4">
  <div class="step-head">
    <span class="step-head__badge">Passo 4</span>
    <h1>Vagas</h1>
    <p>Quadro de vagas (Anexo I)</p>
  </div>

  <div class="step-section">
    <p class="step-section__desc"
      style="font-size:var(--text-sm);color:var(--text-secondary);margin:0 0 var(--space-4)">
      Curso, campus, turno e vagas totais. Distribuição por modalidade pode ser configurada por edital ou seguir
      percentuais legais (Lei 12.711/2012).
    </p>

    <div class="vagas-toolbar">
      <button class="btn btn--outline btn--sm" id="btn-add-curso" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" aria-hidden="true">
          <path d="M12 5v14M5 12h14" />
        </svg>
        Adicionar curso
      </button>
    </div>
    <fieldset class="scroll-tabela">
      <div class="vagas-table-wrap" id="vagas-table-wrap">
        <table class="vagas-table" aria-label="Quadro de vagas">
          <thead>
            <tr>
              <th>Curso</th>
              <th>Campus</th>
              <th class="vagas-table__turno">Turno</th>
              <th class="vagas-table__vagas">Vagas</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="vagas-tbody"></tbody>
        </table>
      </div>

      <div class="vagas-cards-wrap" id="vagas-cards-wrap" hidden>
        <div class="vagas-cards-header">Oferta de curso</div>
        <div id="vagas-cards"></div>
      </div>

      <div class="vagas-empty-state desktop-only" id="vagas-empty-state">
        Nenhum curso adicionado. Clique em "+ Adicionar curso" para começar.
      </div>

      <div class="vagas-total-bar">Total de vagas: <span id="vagas-total">0</span></div>
  </div>

  <dialog class="vagas-modal" id="vagas-modal" aria-labelledby="vagas-modal-title">
    <div class="vagas-modal__panel">
      <div class="vagas-modal__header">
        <h2 class="vagas-modal__title" id="vagas-modal-title">Adicionar cursos</h2>
        <button class="vagas-modal__close" id="vagas-modal-close" type="button" aria-label="Fechar modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="vagas-modal__body">
        <ul class="vagas-modal__list" id="vagas-modal-list" role="group" aria-labelledby="vagas-modal-title"></ul>
      </div>
      <div class="vagas-modal__footer">
        <button class="btn btn--ghost" id="vagas-modal-cancel" type="button">Cancelar</button>
        <button class="btn btn--primary" id="vagas-modal-confirm" type="button">Confirmar seleção</button>
      </div>
    </div>
  </dialog>
  </fieldset>

</template>

<template id="step-5">
  <div class="step-head">
    <span class="step-head__badge">Passo 5</span>
    <h1>Etapas</h1>
  </div>
  <p class="etapas-subtitle">Etapas em ordem cronológica</p>
  <p class="etapas-aceitas">Etapas aceitas.</p>

  <fieldset class="scroll-tabela">
    <div class="etapas-list" id="etapas-list"></div>
  </fieldset>

  <div class="etapas-add-wrap">
    <button class="btn btn--outline" id="btn-add-etapa" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" aria-hidden="true">
        <path d="M12 5v14M5 12h14" />
      </svg>
      Adicionar etapa
    </button>
  </div>
</template>

<template id="step-6">
  <div class="step-head">
    <span class="step-head__badge">Passo 6</span>
    <h1>Passo 6: Fórmula e precisão</h1>
  </div>
  <p class="step-subtitle">Fórmula de agregação aplicada à nota final + regra de precisão decimal.</p>

  <div class="step-card">
    <div class="form-field">
      <label class="label" for="f-agregacao">Agregação</label>
      <select class="input" id="f-agregacao">
        <option value="MEDIA_PONDERADA" selected>— escolher —</option>
        <option value="MEDIA_PONDERADA">Média Ponderada — Σ(nota×peso) / Σ pesos</option>
        <option value="SOMA_PONDERADA_COM_FATOR">Soma Ponderada com Fator — Σ(nota×peso) / fator</option>
        <option value="MEDIA_SIMPLES">Média Simples — Σ nota / N etapas</option>
        <option value="MEDIA_PONDERADA_ENEM">Média Ponderada ENEM — pesos por área + grupo de curso</option>
      </select>
    </div>

    <div class="form-field" style="margin-top:var(--space-4);max-width:280px">
      <label class="label" for="f-precisao">Precisão</label>
      <select class="input" id="f-precisao">
        <option value="MEDIA_PONDERADA" selected>— escolher —</option>
        <option value="TRUNCAR_2_CASAS">Truncar 2 casas decimais (PSIQ)</option>
        <option value="ARREDONDAR_PARA_CIMA_2_CASAS_SE_3A_GTE_5">Arredondar para cima 2 casas se 3ª casa ≥ 5 (PSE, PS
          Convênios)</option>
      </select>
    </div>
  </div>

  <div class="formula-preview">
    <p class="formula-preview__label">Preview da fórmula</p>
    <p class="formula-preview__text">NOTA_FINAL = ((N1×1) + (N2×1) + (N3×1) + (N4×1) + (N5×1)) / 5</p>
  </div>
</template>

<template id="step-7">
  <div class="step-head">
    <span class="step-head__badge">Passo 7</span>
    <h1>Bônus (opcional)</h1>
  </div>
  <p class="step-subtitle">Bônus regional (opcional). Comum em PS Convênios. Quando habilitado, aplicado conforme tipo
    escolhido sobre as modalidades selecionadas.</p>

  <div class="step-card">
    <label class="check-item">
      <input type="checkbox" id="f-bonus-ativo">
      <span>Aplicar bônus neste edital?</span>
    </label>

    <div class="bonus-info" id="bonus-info-msg">
      Bônus desabilitado — passo será marcado como concluído sem ação adicional.
    </div>

    <div class="bonus-config" id="bonus-config" hidden>
      <div class="form-grid form-grid--3">
        <div class="form-field">
          <label class="label" for="f-bonus-tipo">Tipo de bônus</label>
          <select class="input" id="f-bonus-tipo">
            <option value="" selected>— escolher —</option>
            <option value="ADITIVO">Aditivo — nota + (valor × nota)</option>
            <option value="MULTIPLICATIVO">Multiplicativo — nota × (1 + valor)</option>
          </select>
        </div>
        <div class="form-field">
          <label class="label" for="f-bonus-valor">Valor (decimal)</label>
          <input class="input" type="number" id="f-bonus-valor" min="0" max="1" step="0.01" placeholder="0.20">
          <span class="field-hint">Ex.: 0.20 = 20%</span>
        </div>
        <div class="form-field">
          <label class="label" for="f-bonus-criterio">Critério de elegibilidade</label>
          <select class="input" id="f-bonus-criterio">
            <option value="" selected>— escolher —</option>
            <option value="RESIDENCIA_MUNICIPIO_CONVENIO">Residência no município do convênio</option>
            <option value="MATRICULA_ESCOLAR_MUNICIPIO">Matrícula escolar no município do convênio</option>
            <option value="OUTRO">Outro critério (descrever)</option>
          </select>
        </div>
      </div>

      <div class="form-field" style="margin-top:var(--space-5)">
        <span class="label">Modalidades aplicáveis</span>
        <div class="checkbox-grid checkbox-grid--5">
          <label class="check-item"><input type="checkbox"><span>AC</span></label>
          <label class="check-item"><input type="checkbox"><span>V</span></label>
          <label class="check-item"><input type="checkbox"><span>LB_PPI</span></label>
          <label class="check-item"><input type="checkbox"><span>LB_Q</span></label>
